<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Het Enterprise Database</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #1e293b 0%, #0f172a 60%, #020617 100%);
        color: #e2e8f0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .card {
        width: min(500px, 92vw);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.82);
        padding: 24px;
      }
      h1 {
        margin-top: 0;
        font-size: 24px;
      }
      p {
        color: #cbd5e1;
      }
      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>You are offline</h1>
      <p>The app is installed and available, but this action needs network access.</p>
      <p>Reconnect and return to <a href="/">dashboard</a>.</p>
    </section>
  </body>
</html>
